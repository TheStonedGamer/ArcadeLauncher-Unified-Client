name: Release

# Builds the real installable artifacts on both OSes and attaches them to a
# GitHub Release: Windows NSIS installer + updater artifacts, and the Linux
# .deb / .rpm / AppImage. Triggered only by pushing a `vX.Y.Z` tag (or manual
# dispatch) — never on normal pushes, so it can't gate the green main build.
#
# Requires two repo secrets before the first real release (the in-app updater
# signs artifacts with them):
#   TAURI_SIGNING_PRIVATE_KEY           (contents of ~/.tauri/arcade-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty for this key)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # No linker override on Windows (MSVC link.exe).
            rustflags: ""
          - os: ubuntu-22.04
            # Use lld for the link step — much faster than the default bfd.
            rustflags: "-C link-arg=-fuse-ld=lld"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    # Speeds the Rust link step on Linux; harmless (empty) on Windows. Set at job
    # scope so both the sidecar build and the tauri-action app build pick it up.
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld

      # Tauri downloads the WiX + NSIS toolchains on first bundle and caches them
      # under %LOCALAPPDATA%\tauri. Persisting that across runs skips the repeated
      # (~100 MB) download each release build. Windows-only; no-op elsewhere.
      - name: Cache Tauri bundler tools (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri
          key: tauri-bundler-tools-${{ runner.os }}-v1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Keep a cache even when a run fails (e.g. a flaky bundle step) so the
          # next attempt still reuses compiled deps. Shared key lets the sidecar
          # and app builds resolve the same cache.
          cache-on-failure: true
          shared-key: release-${{ matrix.os }}

      - name: Install npm deps
        run: npm ci

      # Build the bootstrap updater and stage it as a Tauri sidecar so the
      # bundler installs updater.exe (or `updater` on Linux) next to the app.
      # externalBin requires the file to pre-exist with a target-triple suffix.
      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "src-tauri/target/release/updater.exe" "src-tauri/binaries/updater-$TRIPLE.exe"
          else
            cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"
          fi

      - name: Build + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "ArcadeLauncher ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
