name: Release

# Builds the real installable artifacts and attaches them to a GitHub Release:
# Windows NSIS installer + updater artifacts, and the Linux .deb / .rpm /
# AppImage. Triggered only by pushing a `vX.Y.Z` tag (or manual dispatch) —
# never on normal pushes, so it can't gate the green main build.
#
# THREE-PHASE FLOW (avoids the duplicate-release race):
#   1. create-release  — creates ONE draft release up front and outputs its id.
#   2. release-windows / release-linux — each uploads its artifacts to that
#      release by `releaseId`, so neither leg ever creates a release of its own.
#   3. publish-release — flips the draft to published once both legs succeed.
# Previously both legs ran tauri-action with `releaseDraft: false`; because
# GitHub's "get release by tag" never returns drafts, a leg uploading while the
# other was still in draft couldn't see it and created a SECOND release. One won
# and published with everything; the loser was stranded as an orphan draft. The
# single up-front draft removes that race entirely.
#
# BUILD INFRA: the Windows leg builds NATIVELY on a self-hosted Windows host; the
# Linux leg builds natively in a Proxmox container.
#   * Windows leg  → self-hosted Windows runner (labels `self-hosted, Windows,
#     X64` → `pc-win-runner`). Native MSVC build with the host's Rust toolchain +
#     Visual Studio Build Tools, bundled to an NSIS `.exe` (tauri fetches makensis
#     itself on Windows). MSI/WiX stays DROPPED — the in-app updater consumes the
#     NSIS setup.exe. The runner must have Rust (rustup), Node, and the MSVC build
#     tools (link.exe + Windows SDK) installed.
#   * Linux leg    → self-hosted `prox-pve` (CT 130 `arcade-gh-runner`), building
#     natively. CT 130 also hosts the Server repo's runner.
# The earlier BI1 cargo-xwin cross-compile on Linux (`prox-xwin`, CT 132) was
# ABANDONED: $GITHUB_PATH never propagated cargo onto that runner's step PATH and
# even an explicit PATH export failed to resolve cargo, so we reverted to a real
# Windows host. The trivial create/publish API jobs run on GitHub-hosted
# `ubuntu-latest`. Safe for a PUBLIC repo: tag-triggered only, and tags can only be
# pushed by collaborators with write access.
#
# Requires two repo secrets before the first real release (the in-app updater
# signs artifacts with them):
#   TAURI_SIGNING_PRIVATE_KEY           (contents of ~/.tauri/arcade-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty for this key)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Serialize runs for the same tag so a manual re-dispatch can't race a still-
# running build. cancel-in-progress is deliberately FALSE here (unlike CI): a
# release build signs and uploads artifacts into a draft, and aborting it
# mid-flight could strand a half-uploaded release. Queue instead of cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Phase 1: create the single draft release --------------------------
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `v${context.runNumber}`;
            core.setOutput('tag', tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ArcadeLauncher ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---- Phase 2a: Windows leg — native MSVC build on a Windows host --------
  # Builds the MSVC-ABI binary natively with the host's Rust toolchain + VS Build
  # Tools and bundles the NSIS installer (tauri fetches makensis itself on Windows
  # — native build, no wine). MSI/WiX is intentionally NOT built: the in-app updater
  # consumes the NSIS setup.exe (its platform_keys prefer the `-nsis` key and
  # update.rs explicitly avoids the admin-oriented MSI), and the bundled stream-engine
  # OpenSSL DLLs trip WiX ICE38 under the app's per-user (`currentUser`) install
  # (file-keypath components in a user-profile dir need an HKCU keypath). NSIS has no
  # such constraint and ships the engine fine. Runs on the
  # self-hosted Windows runner pinned to the `arcade-win10` label → VM 111
  # (`arcade-win10-runner`); the bare self-hosted/Windows/X64 set also matches other
  # Windows runners, so the unique label keeps this leg deterministic. Runs in
  # PARALLEL with the Linux leg.
  release-windows:
    needs: create-release
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # See ci.yml: on this self-hosted Windows host rustup is already on PATH, so
      # dtolnay skips adding CARGO_HOME\bin to $GITHUB_PATH, leaving `cargo`
      # unresolved in the `shell: powershell` sidecar step. Ask rustup (resolves
      # in bash) where cargo is and put its dir on PATH for all later steps.
      - name: Put cargo on PATH (self-hosted)
        shell: bash
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-windows

      - name: Install npm deps
        run: npm ci

      # Build the bootstrap updater natively and stage it as the Tauri sidecar.
      # externalBin requires the file to pre-exist with the host target-triple
      # suffix (x86_64-pc-windows-msvc) and the `.exe` extension.
      - name: Build bootstrap updater sidecar
        # Windows PowerShell 5.1 (the Win10 runner has no pwsh / PowerShell 7);
        # this script is 5.1-compatible.
        shell: powershell
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item src-tauri/target/release/updater.exe `
            src-tauri/binaries/updater-x86_64-pc-windows-msvc.exe

      # Stage the GPL stream-engine sidecar (bundled via the release-only overlay
      # tauri.engine-bundle.conf.json, passed with `--config` in the build step
      # below — NOT a platform config, so CI's `cargo check` never requires the
      # engine binary). The engine ships per-OS assets; the Linux leg has its own
      # staging step below. externalBin wants the file with the host target-triple
      # suffix; ALL the engine's runtime DLLs ride along as bundle resources placed
      # next to the exe — OpenSSL (NvHTTP pairing) PLUS SDL2/FFmpeg/Opus (the
      # client.start renderer). v0.2.0 ships 7 of them. Pulled from the
      # engine repo's public release, so no token is required. Bump $ver (in lockstep
      # with the Linux staging step) when the client adopts a newer engine.
      - name: Stage stream-engine sidecar (Windows)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "0.3.5"
          $url = "https://github.com/TheStonedGamer/ArcadeLauncher-StreamEngine/releases/download/v$ver/ArcadeLauncher-StreamEngine-$ver-win-x64.zip"
          $zip = Join-Path $env:RUNNER_TEMP "arcade-stream-engine.zip"
          $tmp = Join-Path $env:RUNNER_TEMP "arcade-stream-engine"
          Invoke-WebRequest -Uri $url -OutFile $zip
          if (Test-Path $tmp) { Remove-Item -Recurse -Force $tmp }
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          $dest = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item (Join-Path $tmp "arcade-stream-engine.exe") `
            (Join-Path $dest "arcade-stream-engine-x86_64-pc-windows-msvc.exe") -Force
          # Copy ALL runtime DLLs the engine ships (OpenSSL for pairing + SDL2/FFmpeg/
          # Opus for the client.start renderer). v0.2.0 ships 7; globbing keeps this in
          # lockstep with whatever the engine zip carries across future engine bumps.
          Copy-Item (Join-Path $tmp "*.dll") $dest -Force

      # Stage the bundled Tailscale (T12k-8 play-from-anywhere): the launcher ships
      # `tailscale.exe`/`tailscaled.exe` next to the app (externalBin in
      # tauri.engine-bundle.conf.json) so a remote host's 100.64.x.x mesh IP is
      # dialable with no separate user-facing Tailscale install. Tailscale ships NO
      # standalone Windows zip — only the .msi installer — so we do an administrative
      # extract (`msiexec /a`, which unpacks the payload WITHOUT installing or
      # registering the service) and lift the binaries out. wintun.dll, if the MSI
      # carries it, rides along via the binaries/*.dll resource glob; modern
      # tailscaled self-extracts an embedded copy at runtime otherwise.
      # Keep $ver in lockstep with the Linux staging step.
      - name: Stage Tailscale sidecar (Windows)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $ver = "1.98.4"
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-${ver}-amd64.msi"
          $msi = Join-Path $env:RUNNER_TEMP "tailscale.msi"
          $tmp = Join-Path $env:RUNNER_TEMP "tailscale"
          Invoke-WebRequest -Uri $url -OutFile $msi
          if (Test-Path $tmp) { Remove-Item -Recurse -Force $tmp }
          New-Item -ItemType Directory -Force -Path $tmp | Out-Null
          # Administrative install = unpack only (no service, no system change).
          $p = Start-Process msiexec -ArgumentList "/a", "`"$msi`"", "/qn", "TARGETDIR=`"$tmp`"" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "msiexec admin-extract failed ($($p.ExitCode))" }
          $dest = "src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $cli = Get-ChildItem -Recurse -Path $tmp -Filter "tailscale.exe" | Select-Object -First 1
          $daemon = Get-ChildItem -Recurse -Path $tmp -Filter "tailscaled.exe" | Select-Object -First 1
          if (-not $cli -or -not $daemon) { throw "tailscale.exe/tailscaled.exe not found in MSI payload" }
          Copy-Item $cli.FullName (Join-Path $dest "tailscale-x86_64-pc-windows-msvc.exe") -Force
          Copy-Item $daemon.FullName (Join-Path $dest "tailscaled-x86_64-pc-windows-msvc.exe") -Force
          Get-ChildItem -Recurse -Path $tmp -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName $dest -Force }

      # WOW64 redirection fix for makensis under LocalSystem.
      # The runner runs as LocalSystem, so tauri caches its (32-bit) NSIS toolset
      # under %LOCALAPPDATA% = C:\Windows\System32\config\systemprofile\AppData\
      # Local\tauri\NSIS. When tauri spawns the 32-bit makensis.exe, the WOW64
      # File System Redirector rewrites every `System32\...` path it touches to
      # `SysWOW64\...` — which doesn't exist — so makensis fails to find its own
      # Bin\Stubs ("Unable to start child process, error 0x2" / DLL-not-found).
      # A junction at the redirected SysWOW64 location pointing back at the real
      # System32 cache makes those redirected lookups resolve to the real files.
      # Both paths are the same physical dir, so it survives cache re-downloads.
      # (We keep LocalSystem because WiX light.exe ICE validation needs it; a
      # non-system32 cache path isn't reachable since the dirs crate ignores
      # %LOCALAPPDATA% and uses SHGetKnownFolderPath.)
      - name: Fix WOW64 redirection for makensis (self-hosted LocalSystem)
        shell: powershell
        run: |
          $real = "C:\Windows\System32\config\systemprofile\AppData\Local\tauri"
          $wowParent = "C:\Windows\SysWOW64\config\systemprofile\AppData\Local"
          $wowLink = Join-Path $wowParent "tauri"
          New-Item -ItemType Directory -Path $real -Force | Out-Null
          New-Item -ItemType Directory -Path $wowParent -Force | Out-Null
          if (-not (Test-Path $wowLink)) {
            cmd /c mklink /J "$wowLink" "$real"
            if ($LASTEXITCODE -ne 0) { throw "mklink failed ($LASTEXITCODE)" }
          } else {
            "junction already present"
          }

      - name: Build + upload Windows artifacts (native → NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Both installers; the .sig updater artifacts ride along via
          # createUpdaterArtifacts in tauri.conf.json. The updater prefers the
          # NSIS setup.exe (the `-nsis` platform key) — the MSI is just an extra
          # download for users who want it. `--config src-tauri/tauri.engine-bundle.conf.json`
          # overlays the stream-engine sidecar + its OpenSSL DLLs for this build
          # only (staged in the step above); the base config stays engine-free so CI
          # doesn't need the engine binary. The path is relative to the repo root
          # (tauri resolves --config from there, not from the tauri dir).
          args: --bundles nsis --verbose --config src-tauri/tauri.engine-bundle.conf.json  # MSI dropped: ICE38 vs bundled engine DLLs (see job comment)
          # Upload into the pre-created draft; do NOT create or publish a release
          # here (that's what caused the duplicate-draft race).
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 2b: Linux leg (parallel with Windows) -----------------------
  # Only needs the draft; runs concurrently with the Windows leg since the two
  # runners are pinned to disjoint host core sets (see header).
  release-linux:
    needs: create-release
    runs-on: [self-hosted, prox-pve]
    permissions:
      contents: write
    # lld speeds the Rust link step.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-linux

      - name: Install npm deps
        run: npm ci

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      # Stage the GPL stream-engine sidecar for Linux (bundled via the release-only
      # overlay tauri.engine-bundle-linux.conf.json, passed with `--config` below —
      # NOT a platform config, so CI's `cargo check` never requires the engine binary).
      # Unlike Windows, NO DLLs ride along: the engine links system OpenSSL
      # (libssl.so.3/libcrypto.so.3), so the bare ELF is enough. Pulled from the engine
      # repo's public Linux release asset (no token). Bump $ver in lockstep with the
      # Windows staging step when adopting a newer engine.
      - name: Stage stream-engine sidecar (Linux)
        shell: bash
        run: |
          set -euo pipefail
          ver="0.3.5"
          url="https://github.com/TheStonedGamer/ArcadeLauncher-StreamEngine/releases/download/v$ver/ArcadeLauncher-StreamEngine-$ver-linux-x64.tar.gz"
          tmp="$RUNNER_TEMP/arcade-stream-engine"
          rm -rf "$tmp"; mkdir -p "$tmp"
          curl -fsSL "$url" -o "$RUNNER_TEMP/ase-linux.tar.gz"
          tar -xzf "$RUNNER_TEMP/ase-linux.tar.gz" -C "$tmp"
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          install -m 0755 "$tmp/arcade-stream-engine" "src-tauri/binaries/arcade-stream-engine-$TRIPLE"

      # Stage the bundled Tailscale for Linux (T12k-8) — same role as the Windows
      # step: ship `tailscale`/`tailscaled` next to the app (externalBin in
      # tauri.engine-bundle-linux.conf.json). No DLLs: Linux uses /dev/net/tun, not
      # WinTun. Pulled from Tailscale's official static amd64 tarball. Keep $ver in
      # lockstep with the Windows staging step.
      - name: Stage Tailscale sidecar (Linux)
        shell: bash
        run: |
          set -euo pipefail
          ver="1.98.4"
          url="https://pkgs.tailscale.com/stable/tailscale_${ver}_amd64.tgz"
          tmp="$RUNNER_TEMP/tailscale"
          rm -rf "$tmp"; mkdir -p "$tmp"
          curl -fsSL "$url" -o "$RUNNER_TEMP/tailscale.tgz"
          tar -xzf "$RUNNER_TEMP/tailscale.tgz" -C "$tmp"
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cli=$(find "$tmp" -type f -name tailscale | head -n1)
          daemon=$(find "$tmp" -type f -name tailscaled | head -n1)
          [ -n "$cli" ] && [ -n "$daemon" ] || { echo "tailscale/tailscaled not found in $url"; exit 1; }
          install -m 0755 "$cli" "src-tauri/binaries/tailscale-$TRIPLE"
          install -m 0755 "$daemon" "src-tauri/binaries/tailscaled-$TRIPLE"

      - name: Build + upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the same pre-created draft as the Windows leg. `--config`
          # overlays the engine sidecar (updater + engine, no DLL resources) for this
          # build only; default deb/rpm/appimage targets are unchanged (no --bundles).
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --config src-tauri/tauri.engine-bundle-linux.conf.json

  # ---- Phase 3: publish the draft once both legs uploaded ----------------
  publish-release:
    needs: [create-release, release-windows, release-linux]
    # Only flip to published when BOTH build legs succeeded. If a leg failed the
    # release stays a draft (with whatever did upload) for inspection / re-run,
    # rather than publishing a half-complete release.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # actions: write is required for the "Announce changelog to Discord" step
      # below to workflow_dispatch discord-changelog.yml — without it the dispatch
      # 403s ("Resource not accessible by integration"), failing the job after the
      # release has already published.
      actions: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });

      # Fire the Discord changelog announcement. We CANNOT rely on the
      # `release: published` event: the updateRelease call above is made with the
      # default GITHUB_TOKEN, and GitHub deliberately does NOT start new workflow
      # runs from events raised by GITHUB_TOKEN (anti-recursion). workflow_dispatch
      # is exempt from that rule, so dispatch discord-changelog.yml explicitly,
      # passing the tag it expects. (discord-changelog no-ops if DISCORD_WEBHOOK_URL
      # is unset, so this is safe on forks.)
      - name: Announce changelog to Discord
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'discord-changelog.yml',
              ref: '${{ needs.create-release.outputs.tag }}',
              inputs: { tag: '${{ needs.create-release.outputs.tag }}' },
            });
