name: Release

# Builds the real installable artifacts and attaches them to a GitHub Release:
# Windows NSIS installer + updater artifacts, and the Linux .deb / .rpm /
# AppImage. Triggered only by pushing a `vX.Y.Z` tag (or manual dispatch) —
# never on normal pushes, so it can't gate the green main build.
#
# THREE-PHASE FLOW (avoids the duplicate-release race):
#   1. create-release  — creates ONE draft release up front and outputs its id.
#   2. release-windows / release-linux — each uploads its artifacts to that
#      release by `releaseId`, so neither leg ever creates a release of its own.
#   3. publish-release — flips the draft to published once both legs succeed.
# Previously both legs ran tauri-action with `releaseDraft: false`; because
# GitHub's "get release by tag" never returns drafts, a leg uploading while the
# other was still in draft couldn't see it and created a SECOND release. One won
# and published with everything; the loser was stranded as an orphan draft. The
# single up-front draft removes that race entirely.
#
# Both build legs run on SELF-HOSTED runners that live on the same physical
# Proxmox host (Windows VM 131 = label `prox-win`, Linux CT 130 = label
# `prox-pve`). These labels are deliberately Proxmox-specific so the owner's
# desktop PC runners (generic `arcade-win`/`arcade-pve` labels) can never pick up
# a release job — that label collision was the v0.10.3 release blocker. To avoid
# pegging that host, the two legs are STAGGERED: Linux `needs` Windows, so
# Windows builds first and Linux only starts once it's done. The trivial
# create/publish API jobs run on GitHub-hosted `ubuntu-latest` so they never
# touch the Proxmox host. Safe for a PUBLIC repo: tag-triggered only, and tags
# can only be pushed by collaborators with write access.
#
# Requires two repo secrets before the first real release (the in-app updater
# signs artifacts with them):
#   TAURI_SIGNING_PRIVATE_KEY           (contents of ~/.tauri/arcade-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty for this key)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Serialize runs for the same tag so a manual re-dispatch can't race a still-
# running build. cancel-in-progress is deliberately FALSE here (unlike CI): a
# release build signs and uploads artifacts into a draft, and aborting it
# mid-flight could strand a half-uploaded release. Queue instead of cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Phase 1: create the single draft release --------------------------
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `v${context.runNumber}`;
            core.setOutput('tag', tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ArcadeLauncher ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---- Phase 2a: Windows leg (runs first) --------------------------------
  release-windows:
    needs: create-release
    runs-on: [self-hosted, prox-win]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Tauri downloads the WiX + NSIS toolchains on first bundle and caches them
      # under %LOCALAPPDATA%\tauri. Persisting that across runs skips the repeated
      # (~100 MB) download each release build.
      - name: Cache Tauri bundler tools
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\tauri
          key: tauri-bundler-tools-${{ runner.os }}-v2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # NB: do NOT use dtolnay/rust-toolchain here. Its internal "parse toolchain
      # version" step runs under `bash`, and on this self-hosted Windows runner
      # `bash` can resolve to System32 WSL bash (no distro) and fail. Manage the
      # toolchain with Windows PowerShell instead: locate (or install) rustup in
      # %USERPROFILE%\.cargo\bin and export that dir to GITHUB_PATH so the later
      # tauri-action / cargo steps find cargo + rustc.
      - name: Ensure Rust stable toolchain (Windows PowerShell, no WSL bash)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $rustup = Join-Path $cargoBin "rustup.exe"
          if (-not (Test-Path $rustup)) {
            Write-Host "rustup not found at $rustup; installing via rustup-init"
            $init = Join-Path $env:TEMP "rustup-init.exe"
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $init -UseBasicParsing
            & $init -y --default-toolchain stable --profile minimal
            if ($LASTEXITCODE -ne 0) { throw "rustup-init failed ($LASTEXITCODE)" }
          }
          & $rustup default stable
          & $rustup update stable --no-self-update
          # Make cargo/rustc available to every later step in this job.
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin
          & (Join-Path $cargoBin "rustc.exe") -vV

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-windows

      - name: Install npm deps
        run: npm ci

      # Build the bootstrap updater and stage it as a Tauri sidecar so the
      # bundler installs updater.exe next to the app. externalBin requires the
      # file to pre-exist with a target-triple suffix.
      # Windows PowerShell (not bash) to avoid the System32 WSL-bash trap.
      - name: Build bootstrap updater sidecar
        shell: powershell
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $triple = ((rustc -vV | Select-String '^host: ').ToString() -replace '^host: ', '').Trim()
          Copy-Item "src-tauri/target/release/updater.exe" "src-tauri/binaries/updater-$triple.exe"

      - name: Build + upload Windows artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # --verbose so the WiX candle/light bundler output (incl. real
          # light.exe errors) is surfaced in the job log for debugging.
          args: --verbose
          # Upload into the pre-created draft; do NOT create or publish a release
          # here (that's what caused the duplicate-draft race).
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 2b: Linux leg (runs after Windows, on the same host) --------
  release-linux:
    needs: [create-release, release-windows]
    # Run after Windows even if it failed (still serialized via needs) so a
    # Windows hiccup doesn't silently drop the Linux artifacts; only skip if the
    # whole run was cancelled.
    if: ${{ !cancelled() }}
    runs-on: [self-hosted, prox-pve]
    permissions:
      contents: write
    # lld speeds the Rust link step.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-linux

      - name: Install npm deps
        run: npm ci

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Build + upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the same pre-created draft as the Windows leg.
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 3: publish the draft once both legs uploaded ----------------
  publish-release:
    needs: [create-release, release-windows, release-linux]
    # Only flip to published when BOTH build legs succeeded. If a leg failed the
    # release stays a draft (with whatever did upload) for inspection / re-run,
    # rather than publishing a half-complete release.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });
