name: Release

# Builds the real installable artifacts and attaches them to a GitHub Release:
# Windows NSIS installer + updater artifacts, and the Linux .deb / .rpm /
# AppImage. Triggered only by pushing a `vX.Y.Z` tag (or manual dispatch) —
# never on normal pushes, so it can't gate the green main build.
#
# THREE-PHASE FLOW (avoids the duplicate-release race):
#   1. create-release  — creates ONE draft release up front and outputs its id.
#   2. release-windows / release-linux — each uploads its artifacts to that
#      release by `releaseId`, so neither leg ever creates a release of its own.
#   3. publish-release — flips the draft to published once both legs succeed.
# Previously both legs ran tauri-action with `releaseDraft: false`; because
# GitHub's "get release by tag" never returns drafts, a leg uploading while the
# other was still in draft couldn't see it and created a SECOND release. One won
# and published with everything; the loser was stranded as an orphan draft. The
# single up-front draft removes that race entirely.
#
# BUILD INFRA: the Windows leg builds NATIVELY on a self-hosted Windows host; the
# Linux leg builds natively in a Proxmox container.
#   * Windows leg  → self-hosted Windows runner (labels `self-hosted, Windows,
#     X64` → `pc-win-runner`). Native MSVC build with the host's Rust toolchain +
#     Visual Studio Build Tools, bundled to an NSIS `.exe` (tauri fetches makensis
#     itself on Windows). MSI/WiX stays DROPPED — the in-app updater consumes the
#     NSIS setup.exe. The runner must have Rust (rustup), Node, and the MSVC build
#     tools (link.exe + Windows SDK) installed.
#   * Linux leg    → self-hosted `prox-pve` (CT 130 `arcade-gh-runner`), building
#     natively. CT 130 also hosts the Server repo's runner.
#   * Android leg  → ALSO self-hosted `prox-pve` (a SEPARATE physical machine from
#     the Windows host), so the ~14 min APK build runs in PARALLEL with the Windows
#     desktop leg instead of serializing behind it. It queues after the ~5 min Linux
#     desktop leg on that box; wall clock is max(windows, linux + android), not
#     windows + android. Android on Linux also drops the Windows-only C:\rn
#     short-path staging (no CMAKE_OBJECT_PATH_MAX limit on Linux).
# The earlier BI1 cargo-xwin cross-compile on Linux (`prox-xwin`, CT 132) was
# ABANDONED: $GITHUB_PATH never propagated cargo onto that runner's step PATH and
# even an explicit PATH export failed to resolve cargo, so we reverted to a real
# Windows host. The trivial create/publish API jobs run on GitHub-hosted
# `ubuntu-latest`. Safe for a PUBLIC repo: tag-triggered only, and tags can only be
# pushed by collaborators with write access.
#
# Requires two repo secrets before the first real release (the in-app updater
# signs artifacts with them):
#   TAURI_SIGNING_PRIVATE_KEY           (contents of ~/.tauri/arcade-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty for this key)
#
# The Android leg needs four more, and will fail the release rather than ship an
# unsigned APK if any is missing:
#   ANDROID_KEYSTORE_BASE64    (base64 of the release .jks)
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS          (`arcadelauncher`)
#   ANDROID_KEY_PASSWORD
# The keystore itself is NOT in this repo. Its only copies are the owner's
# off-repo backup and the secret above; losing both means no user can ever
# upgrade the phone app again (see the release-android job for why).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Serialize runs for the same tag so a manual re-dispatch can't race a still-
# running build. cancel-in-progress is deliberately FALSE here (unlike CI): a
# release build signs and uploads artifacts into a draft, and aborting it
# mid-flight could strand a half-uploaded release. Queue instead of cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Phase 1: create the single draft release --------------------------
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `v${context.runNumber}`;
            core.setOutput('tag', tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ArcadeLauncher ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---- Phase 2a: Windows leg — native MSVC build on a Windows host --------
  # Builds the MSVC-ABI binary natively with the host's Rust toolchain + VS Build
  # Tools and bundles the NSIS installer (tauri fetches makensis itself on Windows
  # — native build, no wine). MSI/WiX is intentionally NOT built: the in-app updater
  # consumes the NSIS setup.exe (its platform_keys prefer the `-nsis` key and
  # update.rs explicitly avoids the admin-oriented MSI). Runs on the
  # self-hosted Windows runner pinned to the `arcade-win10` label → VM 111
  # (`arcade-win10-runner`); the bare self-hosted/Windows/X64 set also matches other
  # Windows runners, so the unique label keeps this leg deterministic. Runs in
  # PARALLEL with the Linux leg.
  release-windows:
    needs: create-release
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # See ci.yml: on this self-hosted Windows host rustup is already on PATH, so
      # dtolnay skips adding CARGO_HOME\bin to $GITHUB_PATH, leaving `cargo`
      # unresolved in the `shell: powershell` sidecar step. Ask rustup (resolves
      # in bash) where cargo is and put its dir on PATH for all later steps.
      - name: Put cargo on PATH (self-hosted)
        shell: bash
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-windows

      - name: Install npm deps
        run: npm ci

      # Build the bootstrap updater natively and stage it as the Tauri sidecar.
      # externalBin requires the file to pre-exist with the host target-triple
      # suffix (x86_64-pc-windows-msvc) and the `.exe` extension.
      - name: Build bootstrap updater sidecar
        # Windows PowerShell 5.1 (the Win10 runner has no pwsh / PowerShell 7);
        # this script is 5.1-compatible.
        shell: powershell
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item src-tauri/target/release/updater.exe `
            src-tauri/binaries/updater-x86_64-pc-windows-msvc.exe

      # WOW64 redirection fix for makensis under LocalSystem.
      # The runner runs as LocalSystem, so tauri caches its (32-bit) NSIS toolset
      # under %LOCALAPPDATA% = C:\Windows\System32\config\systemprofile\AppData\
      # Local\tauri\NSIS. When tauri spawns the 32-bit makensis.exe, the WOW64
      # File System Redirector rewrites every `System32\...` path it touches to
      # `SysWOW64\...` — which doesn't exist — so makensis fails to find its own
      # Bin\Stubs ("Unable to start child process, error 0x2" / DLL-not-found).
      # A junction at the redirected SysWOW64 location pointing back at the real
      # System32 cache makes those redirected lookups resolve to the real files.
      # Both paths are the same physical dir, so it survives cache re-downloads.
      # (We keep LocalSystem because WiX light.exe ICE validation needs it; a
      # non-system32 cache path isn't reachable since the dirs crate ignores
      # %LOCALAPPDATA% and uses SHGetKnownFolderPath.)
      - name: Fix WOW64 redirection for makensis (self-hosted LocalSystem)
        shell: powershell
        run: |
          $real = "C:\Windows\System32\config\systemprofile\AppData\Local\tauri"
          $wowParent = "C:\Windows\SysWOW64\config\systemprofile\AppData\Local"
          $wowLink = Join-Path $wowParent "tauri"
          New-Item -ItemType Directory -Path $real -Force | Out-Null
          New-Item -ItemType Directory -Path $wowParent -Force | Out-Null
          if (-not (Test-Path $wowLink)) {
            cmd /c mklink /J "$wowLink" "$real"
            if ($LASTEXITCODE -ne 0) { throw "mklink failed ($LASTEXITCODE)" }
          } else {
            "junction already present"
          }

      - name: Build + upload Windows artifacts (native → NSIS + MSI)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # The .sig updater artifacts ride along via createUpdaterArtifacts in
          # tauri.conf.json. The updater prefers the NSIS setup.exe (the `-nsis`
          # platform key). Only the bootstrap updater is bundled as a sidecar
          # (externalBin in tauri.conf.json) — there are no extra runtime sidecars.
          args: --bundles nsis --verbose  # MSI dropped: WiX ICE38 on the per-user install
          # Upload into the pre-created draft; do NOT create or publish a release
          # here (that's what caused the duplicate-draft race).
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 2b: Linux leg (parallel with Windows) -----------------------
  # Only needs the draft; runs concurrently with the Windows leg since the two
  # runners are pinned to disjoint host core sets (see header).
  release-linux:
    needs: create-release
    runs-on: [self-hosted, prox-pve]
    permissions:
      contents: write
    # lld speeds the Rust link step.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-linux

      - name: Install npm deps
        run: npm ci

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Build + upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the same pre-created draft as the Windows leg. Default
          # deb/rpm/appimage targets (no --bundles). Only the bootstrap updater is
          # bundled as a sidecar (externalBin in tauri.conf.json).
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 2c: Android companion — signed APK (parallel with Windows) --
  # Builds the phone app as a RELEASE-signed APK and attaches it to the same
  # draft. Runs on the self-hosted LINUX runner (`prox-pve`), NOT `arcade-win10`,
  # so it runs in PARALLEL with the Windows desktop leg instead of serializing
  # behind it on the one Windows box. The Linux desktop leg finishes in ~5 min and
  # then that machine is otherwise idle, so the ~14 min APK build overlaps the
  # Windows build almost entirely — the release's wall clock drops from
  # (windows + android) to max(windows, linux + android).
  #
  # Building on Linux also removes the Windows-only C:\rn short-path staging: Linux
  # has no 250-char object-file-path limit, so expo-modules-core's C++ compiles in
  # place in the workspace. See android.yml for the full history of that hack.
  #
  # Signing comes from four repo secrets (ANDROID_KEYSTORE_BASE64,
  # ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD), decoded
  # into a keystore outside the workspace and handed to Gradle as properties that
  # `mobile/plugins/withReleaseSigning.js` wires into the generated build.gradle.
  #
  # THE SIGNING KEY IS PERMANENT. Android refuses to update an installed app
  # whose signature changed, so replacing this keystore forces every user to
  # uninstall and lose their app data. Treat it exactly like the WiX UpgradeCode:
  # it cannot be rotated after the first release ships.
  release-android:
    needs: create-release
    runs-on: [self-hosted, prox-pve]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install the Android SDK
        run: |
          set -euo pipefail
          SDK="$HOME/android-sdk"
          BIN="$SDK/cmdline-tools/latest/bin"
          if [ ! -x "$BIN/sdkmanager" ]; then
            mkdir -p "$SDK/cmdline-tools"
            curl -sSLo /tmp/cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q -o /tmp/cmdline-tools.zip -d "$SDK/cmdline-tools"
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/cmdline-tools" "$SDK/cmdline-tools/latest"
          fi
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$BIN" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"
          yes | "$BIN/sdkmanager" --sdk_root="$SDK" --licenses > /dev/null || true
          "$BIN/sdkmanager" --sdk_root="$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      # Fail loudly and EARLY if the secrets are missing, rather than at the
      # very end with a debug-signed APK that looks like a release.
      - name: Decode the release keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for v in KEYSTORE_B64 STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Secret for $v is not set. Refusing to build an unsigned release." >&2
              exit 1
            fi
          done
          # In $HOME (persists on the self-hosted runner) rather than the
          # workspace, so no cleanup step can sweep it into an artifact and
          # `expo prebuild --clean` cannot eat it.
          KS="$HOME/android-signing/arcadelauncher-release.jks"
          mkdir -p "$(dirname "$KS")"
          printf '%s' "$KEYSTORE_B64" | base64 -d > "$KS"
          # Gradle reads these; the file lives at an absolute path so the
          # property does not depend on the build's working directory.
          {
            echo "ARCADE_UPLOAD_STORE_FILE=$KS"
            echo "ARCADE_UPLOAD_STORE_PASSWORD=$STORE_PASSWORD"
            echo "ARCADE_UPLOAD_KEY_ALIAS=$KEY_ALIAS"
            echo "ARCADE_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD"
          } >> "$RUNNER_TEMP/gradle.properties.signing"

      - name: Install npm deps
        working-directory: mobile
        run: npm ci

      - name: Expo prebuild (generate android/)
        working-directory: mobile
        run: npx expo prebuild --platform android --clean --no-install

      # prebuild --clean rewrites android/gradle.properties, so the signing
      # properties are appended AFTER it has run, never before.
      - name: Apply the signing properties
        run: |
          set -euo pipefail
          # Expo's generated gradle.properties ends WITHOUT a trailing newline
          # (last line `android.extraMavenRepos=[]`). A bare `cat >>` would glue
          # the first signing line onto it, so ARCADE_UPLOAD_STORE_FILE would not
          # parse as a property, project.hasProperty() would be false, and the
          # release build type would silently fall back to the debug key — which
          # is exactly what the apksigner step below then rejected. Guarantee the
          # separating newline first.
          printf '\n' >> mobile/android/gradle.properties
          cat "$RUNNER_TEMP/gradle.properties.signing" >> mobile/android/gradle.properties
          rm -f "$RUNNER_TEMP/gradle.properties.signing"
          # Confirm the plugin actually rewrote build.gradle. Without this the
          # only symptom of a failed injection is a debug-signed release.
          grep -q ARCADE_UPLOAD_STORE_FILE mobile/android/app/build.gradle \
            || { echo "::error::withReleaseSigning did not modify build.gradle" >&2; exit 1; }

      - name: Gradle assembleRelease
        working-directory: mobile/android
        run: |
          set -euo pipefail
          ./gradlew assembleRelease --no-daemon --build-cache --stacktrace \
            -PreactNativeArchitectures=arm64-v8a,x86_64

      # apksigner is the authority on what actually signed the APK. If this
      # reports the debug certificate, the release must not ship.
      - name: Verify the APK signature
        run: |
          set -euo pipefail
          APK=$(ls mobile/android/app/build/outputs/apk/release/*.apk | head -1)
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$APK" | tee /tmp/certs.txt
          if grep -qi 'CN=Android Debug' /tmp/certs.txt; then
            echo "::error::APK is signed with the DEBUG certificate." >&2
            exit 1
          fi
          grep -q 'CN=ArcadeLauncher Companion' /tmp/certs.txt \
            || { echo "::error::APK is not signed by the expected release key." >&2; exit 1; }

      - name: Name the APK after the tag
        id: apk
        run: |
          set -euo pipefail
          OUT=mobile/android/app/build/outputs/apk/release
          NAME="ArcadeLauncher-Companion-${{ needs.create-release.outputs.tag }}.apk"
          cp "$(ls "$OUT"/*.apk | head -1)" "$OUT/$NAME"
          echo "path=$OUT/$NAME" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          ls -l "$OUT"

      # Uploaded by release_id, not by tag: the release is still a DRAFT at this
      # point and GitHub's "get release by tag" never returns drafts — the same
      # trap documented in this file's header.
      - name: Attach the APK to the draft release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '${{ steps.apk.outputs.path }}';
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              name: '${{ steps.apk.outputs.name }}',
              data: fs.readFileSync(path),
              headers: {
                'content-type': 'application/vnd.android.package-archive',
                'content-length': fs.statSync(path).size,
              },
            });

  # ---- Phase 2d: stage installers on the self-hosted download server -----
  # After the desktop legs have uploaded to the draft, copy the per-platform
  # installers onto the server that backs the website's Download page
  # (GET /api/downloads/latest builds the manifest; /downloads/<file> serves the
  # bytes via ServeDir). This is what makes "each platform on each update" land on
  # the server automatically instead of by hand.
  #
  # Runs on a self-hosted LAN runner (`prox-pve`) because the target host is on the
  # private homelab network — a GitHub-hosted runner cannot reach it. Desktop
  # installers only: the server's classifier serves Windows/macOS/Linux; the
  # Android APK is not part of the manifest and stays a GitHub-release asset. Only
  # needs the desktop legs (not android), so it overlaps the ~14 min APK build.
  #
  # The destination is REPLACED in place (old installers removed first) so the
  # manifest's derived `version` always reflects exactly this release. Connection
  # details come from repo secrets so no internal host/path is committed to this
  # public repo:
  #   ARCADE_DOWNLOADS_SSH_KEY     ed25519 private key (restricted key on the host)
  #   ARCADE_DOWNLOADS_KNOWN_HOSTS  the host's public key line (pinned, no TOFU)
  #   ARCADE_DOWNLOADS_DEST         user@host of the download server
  #   ARCADE_DOWNLOADS_PATH         absolute downloads dir (server's ARCADE_DOWNLOADS_DIR)
  stage-downloads:
    needs: [create-release, release-windows, release-linux]
    runs-on: [self-hosted, prox-pve]
    permissions:
      # write, not read: the release is still a DRAFT here, and GitHub only
      # exposes a draft's assets to tokens with contents:write (the same reason
      # the build legs use write). With read this 403s "Resource not accessible
      # by integration" on listReleaseAssets.
      contents: write
    steps:
      # Fetch the draft's desktop installers via the GitHub API using
      # actions/github-script (Node — always present) rather than the `gh` CLI,
      # which is NOT installed on this self-hosted runner (exit 127). List assets
      # by release_id (draft-visible; "get release by tag" never returns drafts)
      # and download each matching one to staging/. Excludes the .sig updater
      # sidecars, latest.json, and the .apk.
      - name: Download desktop installers from the draft release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            fs.rmSync('staging', { recursive: true, force: true });
            fs.mkdirSync('staging', { recursive: true });
            const releaseId = ${{ needs.create-release.outputs.release_id }};
            const assets = await github.paginate(
              github.rest.repos.listReleaseAssets,
              { owner: context.repo.owner, repo: context.repo.repo, release_id: releaseId, per_page: 100 },
            );
            const want = /(-setup\.exe|\.msi|\.deb|\.rpm|\.AppImage|\.dmg)$/i;
            const picked = assets.filter(a => want.test(a.name));
            if (picked.length === 0) {
              core.setFailed(`No desktop installers found on release ${releaseId}`);
              return;
            }
            for (const a of picked) {
              const res = await github.rest.repos.getReleaseAsset({
                owner: context.repo.owner, repo: context.repo.repo, asset_id: a.id,
                headers: { accept: 'application/octet-stream' },
              });
              fs.writeFileSync(path.join('staging', a.name), Buffer.from(res.data));
              core.info(`Fetched ${a.name} (${a.size} bytes)`);
            }

      - name: Stage the installers on the download server
        env:
          SSH_KEY: ${{ secrets.ARCADE_DOWNLOADS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.ARCADE_DOWNLOADS_KNOWN_HOSTS }}
          DEST: ${{ secrets.ARCADE_DOWNLOADS_DEST }}
          DLPATH: ${{ secrets.ARCADE_DOWNLOADS_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_KEY:-}" ] || [ -z "${DEST:-}" ] || [ -z "${DLPATH:-}" ]; then
            echo "::error::Download-server secrets are not configured; skipping cannot be silent." >&2
            exit 1
          fi
          KF="$RUNNER_TEMP/dl_key"; KH="$RUNNER_TEMP/dl_known_hosts"
          printf '%s\n' "$SSH_KEY" > "$KF"; chmod 600 "$KF"
          printf '%s\n' "$KNOWN_HOSTS" > "$KH"
          SSHOPTS=(-i "$KF" -o "UserKnownHostsFile=$KH" -o BatchMode=yes)
          # Remove the previous release's installers so the manifest's derived
          # version reflects only this release, then copy the new set in.
          ssh "${SSHOPTS[@]}" "$DEST" \
            "mkdir -p '$DLPATH' && rm -f '$DLPATH'/*.exe '$DLPATH'/*.msi '$DLPATH'/*.deb '$DLPATH'/*.rpm '$DLPATH'/*.AppImage '$DLPATH'/*.dmg"
          scp "${SSHOPTS[@]}" staging/* "$DEST:$DLPATH/"
          echo "Now on the server:"; ssh "${SSHOPTS[@]}" "$DEST" "ls -l '$DLPATH'"
          rm -f "$KF" "$KH"

  # ---- Phase 3: publish the draft once every leg uploaded ----------------
  publish-release:
    needs: [create-release, release-windows, release-linux, release-android, stage-downloads]
    # Only flip to published when ALL build legs succeeded. If a leg failed the
    # release stays a draft (with whatever did upload) for inspection / re-run,
    # rather than publishing a half-complete release.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # actions: write is required for the "Announce changelog to Discord" step
      # below to workflow_dispatch discord-changelog.yml — without it the dispatch
      # 403s ("Resource not accessible by integration"), failing the job after the
      # release has already published.
      actions: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });

      # Fire the Discord changelog announcement. We CANNOT rely on the
      # `release: published` event: the updateRelease call above is made with the
      # default GITHUB_TOKEN, and GitHub deliberately does NOT start new workflow
      # runs from events raised by GITHUB_TOKEN (anti-recursion). workflow_dispatch
      # is exempt from that rule, so dispatch discord-changelog.yml explicitly,
      # passing the tag it expects. (discord-changelog no-ops if DISCORD_WEBHOOK_URL
      # is unset, so this is safe on forks.)
      - name: Announce changelog to Discord
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'discord-changelog.yml',
              ref: '${{ needs.create-release.outputs.tag }}',
              inputs: { tag: '${{ needs.create-release.outputs.tag }}' },
            });
