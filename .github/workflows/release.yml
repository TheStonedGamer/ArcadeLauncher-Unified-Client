name: Release

# Builds the real installable artifacts and attaches them to a GitHub Release:
# Windows NSIS installer + updater artifacts, and the Linux .deb / .rpm /
# AppImage. Triggered only by pushing a `vX.Y.Z` tag (or manual dispatch) —
# never on normal pushes, so it can't gate the green main build.
#
# THREE-PHASE FLOW (avoids the duplicate-release race):
#   1. create-release  — creates ONE draft release up front and outputs its id.
#   2. release-windows / release-linux — each uploads its artifacts to that
#      release by `releaseId`, so neither leg ever creates a release of its own.
#   3. publish-release — flips the draft to published once both legs succeed.
# Previously both legs ran tauri-action with `releaseDraft: false`; because
# GitHub's "get release by tag" never returns drafts, a leg uploading while the
# other was still in draft couldn't see it and created a SECOND release. One won
# and published with everything; the loser was stranded as an orphan draft. The
# single up-front draft removes that race entirely.
#
# BUILD INFRA (BI1): both build legs are now Linux containers on the same Proxmox
# host, each pinned to its own disjoint set of 8 host cores so they build in true
# parallel without contending:
#   * Windows leg  → self-hosted `prox-xwin` (CT 132 `arcade-xwin-build`, cores
#     8-15). CROSS-COMPILED with `cargo-xwin` targeting `x86_64-pc-windows-msvc`
#     (MSVC ABI — clang-cl + lld, CRT/SDK auto-downloaded), bundled to an NSIS
#     `.exe` via `makensis` which runs natively on Linux. MSI/WiX is DROPPED (would
#     need wine); Windows ships the NSIS installer + portable + updater artifacts.
#   * Linux leg    → self-hosted `prox-pve` (CT 130 `arcade-gh-runner`, cores 0-7),
#     building natively. CT 130 also hosts the Server repo's runner.
# The old Proxmox Windows build VM and its `prox-win` runner are ABANDONED — there
# is no Windows host anywhere in this pipeline. The trivial create/publish API jobs
# run on GitHub-hosted `ubuntu-latest`. Safe for a PUBLIC repo: tag-triggered only,
# and tags can only be pushed by collaborators with write access.
#
# Requires two repo secrets before the first real release (the in-app updater
# signs artifacts with them):
#   TAURI_SIGNING_PRIVATE_KEY           (contents of ~/.tauri/arcade-updater.key)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  (empty for this key)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Serialize runs for the same tag so a manual re-dispatch can't race a still-
# running build. cancel-in-progress is deliberately FALSE here (unlike CI): a
# release build signs and uploads artifacts into a draft, and aborting it
# mid-flight could strand a half-uploaded release. Queue instead of cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Phase 1: create the single draft release --------------------------
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag: ${{ steps.create-release.outputs.tag }}
    steps:
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : `v${context.runNumber}`;
            core.setOutput('tag', tag);
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ArcadeLauncher ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ---- Phase 2a: Windows leg — cross-compiled on Linux (BI1) --------------
  # Cross-builds the MSVC-ABI Windows binary with cargo-xwin (clang-cl + lld,
  # CRT/SDK auto-downloaded) and bundles the NSIS installer with makensis. No
  # Windows host, no MSI/WiX. Runs on the self-hosted `prox-xwin` runner (Proxmox
  # CT 132 `arcade-xwin-build`, pinned to host cores 8-15), which is PRE-PROVISIONED
  # with the cross toolchain — clang/clang-cl, lld/lld-link, llvm-lib/llvm-rc,
  # nsis (makensis), Rust stable + the x86_64-pc-windows-msvc target, and
  # cargo-xwin. So this job installs nothing beyond npm deps; if the CT is ever
  # rebuilt, re-provision it (see HANDOFF "BI1 runner topology"). Runs in PARALLEL
  # with the Linux leg, which is pinned to the disjoint cores 0-7 on CT 130.
  release-windows:
    needs: create-release
    runs-on: [self-hosted, prox-xwin]
    permissions:
      contents: write
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      # The self-hosted runner runs `run:` steps in a non-login shell
      # (bash --noprofile --norc), which does NOT source ~/.cargo/env, so rustup's
      # ~/.cargo/bin is off PATH and `cargo` isn't found. Put it on $GITHUB_PATH up
      # front so EVERY later step inherits it — including tauri-action, which shells
      # out to `cargo xwin` itself. Use the ABSOLUTE path, not $HOME: the runner
      # service's environment has no HOME set, and actions/checkout temporarily
      # overrides HOME, so "${HOME}/.cargo/bin" expanded to "/.cargo/bin" and the
      # earlier $HOME-based fix silently did nothing. The runner user is `runner`
      # (home /home/runner), where rustup installs cargo.
      - name: Put cargo on PATH (self-hosted, non-login shell)
        run: echo "/home/runner/.cargo/bin" >> "$GITHUB_PATH"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-windows-xwin

      - name: Install npm deps
        run: npm ci

      # Cross-build the bootstrap updater for the MSVC target and stage it as the
      # Tauri sidecar. externalBin requires the file to pre-exist with the
      # target-triple suffix (note the `.exe` for the Windows target).
      - name: Build bootstrap updater sidecar (cross)
        shell: bash
        run: |
          cargo xwin build --release -p arcade_updater \
            --target "$WINDOWS_TARGET" --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          cp "src-tauri/target/$WINDOWS_TARGET/release/updater.exe" \
            "src-tauri/binaries/updater-$WINDOWS_TARGET.exe"

      - name: Build + upload Windows artifacts (cargo-xwin → NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # --runner cargo-xwin drives the MSVC cross-build; only the NSIS bundle
          # is produced on Linux (MSI/WiX dropped — would need wine).
          # NSIS only; the .sig updater artifacts ride along via
          # createUpdaterArtifacts in tauri.conf.json.
          args: --runner cargo-xwin --target x86_64-pc-windows-msvc --bundles nsis --verbose
          # Upload into the pre-created draft; do NOT create or publish a release
          # here (that's what caused the duplicate-draft race).
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 2b: Linux leg (parallel with Windows) -----------------------
  # Only needs the draft; runs concurrently with the Windows leg since the two
  # runners are pinned to disjoint host core sets (see header).
  release-linux:
    needs: create-release
    runs-on: [self-hosted, prox-pve]
    permissions:
      contents: write
    # lld speeds the Rust link step.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-linux

      - name: Install npm deps
        run: npm ci

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Build + upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Upload into the same pre-created draft as the Windows leg.
          releaseId: ${{ needs.create-release.outputs.release_id }}

  # ---- Phase 3: publish the draft once both legs uploaded ----------------
  publish-release:
    needs: [create-release, release-windows, release-linux]
    # Only flip to published when BOTH build legs succeeded. If a leg failed the
    # release stays a draft (with whatever did upload) for inspection / re-run,
    # rather than publishing a half-complete release.
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
              prerelease: false,
            });
