name: CI

# Enforces the project rule: every push must be green on BOTH Windows and Linux
# before anything can ship. Frontend typecheck/build + Rust compile + unit tests
# run on both OSes.
#
# BUILD INFRA (BI1): both legs are Linux containers on the same Proxmox host,
# pinned to disjoint 8-core sets so they build in true parallel:
#   * Windows leg → self-hosted `prox-xwin` (CT 132, cores 8-15). CROSS-COMPILED
#     with `cargo-xwin` targeting `x86_64-pc-windows-msvc` (MSVC ABI). Because the
#     cross-built test binaries are Windows `.exe`s that can't execute on Linux
#     (they'd need wine), this leg is a COMPILE CHECK only — it proves the code
#     builds for the MSVC target.
#   * Linux leg   → self-hosted `prox-pve` (CT 130, cores 0-7), building natively
#     and running the actual unit tests (OS-agnostic pure logic).
# Both runner CTs are PRE-PROVISIONED with their toolchains; the Proxmox Windows
# build VM (`prox-win`) is ABANDONED — there is no Windows host in this pipeline.

on:
  push:
    branches: [main]
    # Docs-only pushes can't break the build, so skip CI for them and save a full
    # staggered Windows+Linux run on the shared host.
    paths-ignore:
      - "**/*.md"
  pull_request:
  workflow_dispatch:

# Supersede an in-flight run when a newer commit lands on the same ref, so a
# stale commit's build stops hogging the runners while a newer commit waits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# line-tables-only debuginfo keeps backtraces useful while cutting the bytes the
# compiler emits and the linker processes for the dev/test profile — a free win
# on the `cargo test` step.
#
# Deliberately NOT set here:
#   * CARGO_INCREMENTAL=1 — fights swatinem/rust-cache (incremental artifacts are
#     huge, churn every commit, and blow up cache save/restore time).
#   * -j / RAYON / test-threads counts — cargo, libtest, and vitest already fan
#     out to the core count visible to each guest, which is now its pinned set of
#     8 dedicated cores; a hand-pinned number would just risk oversubscription.
env:
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  # ---- Windows leg — cross-compile check on Linux (BI1) -------------------
  # Proves the code compiles for x86_64-pc-windows-msvc via cargo-xwin. Tests run
  # on the Linux leg (cross-built Windows test exes can't run here without wine).
  windows:
    runs-on: [self-hosted, prox-xwin]
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      # The prox-xwin CT (132) is pre-provisioned with clang-cl/lld-link/llvm-lib/
      # nsis + the msvc Rust target + cargo-xwin, so nothing to install here.
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-windows-xwin

      - name: Install npm deps
        run: npm ci

      - name: Frontend build (tsc + vite)
        run: npm run build

      # tauri.conf.json declares the bootstrap updater as an externalBin sidecar
      # (binaries/updater-<triple>.exe), and tauri-build's custom build command
      # fails if that file is absent — so cross-build it before the app check.
      - name: Build bootstrap updater sidecar (cross)
        shell: bash
        run: |
          cargo xwin build --release -p arcade_updater \
            --target "$WINDOWS_TARGET" --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          cp "src-tauri/target/$WINDOWS_TARGET/release/updater.exe" \
            "src-tauri/binaries/updater-$WINDOWS_TARGET.exe"

      - name: Rust compile check (release, MSVC cross-target)
        working-directory: src-tauri
        run: cargo xwin check --release --locked --target "$WINDOWS_TARGET"

  # ---- Linux leg (runs in parallel with Windows) --------------------------
  # No `needs: windows`: the Windows leg now runs on a separate GitHub-hosted
  # runner, so the two legs are fully independent and build concurrently.
  linux:
    runs-on: [self-hosted, prox-pve]
    # Use lld for the link step — much faster than the default bfd.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          # Remove broken Microsoft apt sources that 403 on some hosts.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-linux

      - name: Install npm deps
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Frontend build (tsc + vite)
        run: npm run build

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked
