name: CI

# Enforces the project rule: every push must be green on BOTH Windows and Linux
# before anything can ship. Frontend typecheck/build + Rust compile + unit tests
# run on both OSes.
#
# BUILD INFRA — the two legs sit on DIFFERENT PHYSICAL MACHINES, so they build
# fully in parallel (neither job declares `needs:`; do not add one):
#   * Windows leg → `arcade-win10-runner`, VM 111 on Proxmox node **pve3**
#     (10.0.0.98). Native MSVC build + unit tests. The runner needs Rust (rustup),
#     Node, and the MSVC build tools (link.exe + Windows SDK).
#   * Linux leg   → `arcade-pve-client-runner`, CT 130 on Proxmox node **pve2**
#     (10.0.0.128), at /home/runner/actions-runner-client. Builds natively and runs
#     the unit tests (OS-agnostic pure logic) plus the vitest suite.
# Because the hosts are separate, neither leg's apt/cargo work can contend with the
# other's — the two finish in max(win, linux), not win + linux.
# The earlier BI1 cargo-xwin cross-compile on Linux (`prox-xwin`, CT 132) was
# ABANDONED — cargo never resolved on that runner's step PATH — so the Windows leg
# is a real Windows host again.

on:
  push:
    branches: [main]
    # Docs-only pushes can't break the build, so skip CI for them rather than tie
    # up both build hosts for a change no compiler will ever see.
    paths-ignore:
      - "**/*.md"
  pull_request:
  workflow_dispatch:

# Supersede an in-flight run when a newer commit lands on the same ref, so a
# stale commit's build stops hogging the runners while a newer commit waits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# line-tables-only debuginfo keeps backtraces useful while cutting the bytes the
# compiler emits and the linker processes for the dev/test profile — a free win
# on the `cargo test` step.
#
# Deliberately NOT set here:
#   * CARGO_INCREMENTAL=1 — fights swatinem/rust-cache (incremental artifacts are
#     huge, churn every commit, and blow up cache save/restore time).
#   * -j / RAYON / test-threads counts — cargo, libtest, and vitest already fan
#     out to the core count visible to each guest, which is now its pinned set of
#     8 dedicated cores; a hand-pinned number would just risk oversubscription.
env:
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  # ---- Windows leg — native MSVC build on a Windows host ------------------
  # Compiles for x86_64-pc-windows-msvc natively with the host's Rust toolchain +
  # VS Build Tools. Pinned to the `arcade-win10` label → VM 111 (Proxmox CT/VM
  # `arcade-win10-runner`); the bare self-hosted/Windows/X64 set also matches other
  # Windows runners, so the unique label keeps this leg deterministic.
  windows:
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      # On this self-hosted Windows host rustup is already on PATH, so
      # dtolnay/rust-toolchain SKIPS appending CARGO_HOME\bin to $GITHUB_PATH
      # (it only does so when rustup is missing). That left `cargo` unresolved in
      # later steps — notably the `shell: powershell` sidecar step. rustup itself
      # resolves in bash here, so ask it where cargo lives and put that dir on
      # PATH for every subsequent step / shell. Host-agnostic: no hardcoded path.
      - name: Put cargo on PATH (self-hosted)
        shell: bash
        run: dirname "$(rustup which cargo)" >> "$GITHUB_PATH"

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-windows

      - name: Install npm deps
        run: npm ci

      - name: Frontend build (tsc + vite)
        run: npm run build

      # tauri.conf.json declares the bootstrap updater as an externalBin sidecar
      # (binaries/updater-<triple>.exe); build it before the app check so the
      # custom tauri build command finds it.
      - name: Build bootstrap updater sidecar
        # Windows PowerShell 5.1 (the Win10 runner has no pwsh / PowerShell 7);
        # this script is 5.1-compatible.
        shell: powershell
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Copy-Item src-tauri/target/release/updater.exe `
            src-tauri/binaries/updater-x86_64-pc-windows-msvc.exe

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked

  # ---- Linux leg (runs in parallel with Windows) --------------------------
  # No `needs: windows`: the Windows leg runs on a different physical host (VM 111
  # on pve3) than this one (CT 130 on pve2), so the two legs are fully independent
  # and build concurrently.
  linux:
    runs-on: [self-hosted, prox-pve]
    # Use lld for the link step — much faster than the default bfd.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          # Remove broken Microsoft apt sources that 403 on some hosts.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-linux

      - name: Install npm deps
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Frontend build (tsc + vite)
        run: npm run build

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked
