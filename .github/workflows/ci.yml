name: CI

# Enforces the project rule: every push must be green on BOTH Windows and Linux
# before anything can ship. Frontend typecheck/build + Rust compile + unit tests
# run on both OSes.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rustflags: ""
          - os: ubuntu-22.04
            # Use lld for the link step — much faster than the default bfd.
            rustflags: "-C link-arg=-fuse-ld=lld"
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          # Remove broken Microsoft apt sources that return 403 on GitHub runners.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-${{ matrix.os }}

      - name: Install npm deps
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Frontend build (tsc + vite)
        run: npm run build

      # tauri.conf.json declares the bootstrap updater as an externalBin sidecar
      # (binaries/updater-<triple>), and tauri-build's custom build command fails
      # if that file is absent — so the sidecar must exist before any cargo
      # invocation, mirroring the Release workflow.
      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "src-tauri/target/release/updater.exe" "src-tauri/binaries/updater-$TRIPLE.exe"
          else
            cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"
          fi

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked
