name: CI

# Enforces the project rule: every push must be green on BOTH Windows and Linux
# before anything can ship. Frontend typecheck/build + Rust compile + unit tests
# run on both OSes.
#
# Runs on the SELF-HOSTED Proxmox runners (Windows VM 131 = label `prox-win`,
# Linux CT 130 = label `prox-pve`) — the same hosts the Release workflow uses, so
# CI and release build in identical environments. The two legs are STAGGERED
# (Linux `needs` Windows) so they don't peg the shared physical host at once.
#
# Self-hosted Windows note: do NOT use dtolnay/rust-toolchain or `shell: bash` on
# `prox-win`. Their internal bash can resolve to System32 WSL bash (no distro)
# and fail. The Windows leg manages rustup via Windows PowerShell and runs its
# shell steps in PowerShell; the Linux leg keeps dtolnay + bash.

on:
  push:
    branches: [main]
    # Docs-only pushes can't break the build, so skip CI for them and save a full
    # staggered Windows+Linux run on the shared host.
    paths-ignore:
      - "**/*.md"
  pull_request:
  workflow_dispatch:

# Supersede an in-flight run when a newer commit lands on the same ref. On the
# self-hosted single-host runners this is the biggest lever for "faster local
# runs": it stops the staggered Windows→Linux legs of a stale commit from
# hogging the box while a newer commit waits behind them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# line-tables-only debuginfo keeps backtraces useful while cutting the bytes the
# compiler emits and the linker processes for the dev/test profile — a free win
# on the `cargo test` step.
#
# Deliberately NOT set here:
#   * CARGO_INCREMENTAL=1 — fights swatinem/rust-cache (incremental artifacts are
#     huge, churn every commit, and blow up cache save/restore time).
#   * -j / RAYON / test-threads counts — cargo, libtest, and vitest already fan
#     out to the host core count; pinning a number risks oversubscribing the
#     shared physical host (the Windows VM and Linux CT share cores).
# The real remaining lever is host-side vCPUs (see pct commands in the handoff).
env:
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

jobs:
  # ---- Windows leg (runs first) -------------------------------------------
  windows:
    runs-on: [self-hosted, prox-win]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Manage the toolchain with Windows PowerShell instead of
      # dtolnay/rust-toolchain (whose bash step trips the System32 WSL trap).
      - name: Ensure Rust stable toolchain (Windows PowerShell, no WSL bash)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          $rustup = Join-Path $cargoBin "rustup.exe"
          if (-not (Test-Path $rustup)) {
            Write-Host "rustup not found at $rustup; installing via rustup-init"
            $init = Join-Path $env:TEMP "rustup-init.exe"
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $init -UseBasicParsing
            & $init -y --default-toolchain stable --profile minimal
            if ($LASTEXITCODE -ne 0) { throw "rustup-init failed ($LASTEXITCODE)" }
          }
          & $rustup default stable
          & $rustup update stable --no-self-update
          Add-Content -Path $env:GITHUB_PATH -Value $cargoBin
          & (Join-Path $cargoBin "rustc.exe") -vV

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-windows

      - name: Install npm deps
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Frontend build (tsc + vite)
        run: npm run build

      # tauri.conf.json declares the bootstrap updater as an externalBin sidecar
      # (binaries/updater-<triple>), and tauri-build's custom build command fails
      # if that file is absent — so the sidecar must exist before any cargo
      # invocation, mirroring the Release workflow. PowerShell (not bash) here.
      - name: Build bootstrap updater sidecar
        shell: powershell
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          New-Item -ItemType Directory -Force src-tauri/binaries | Out-Null
          $triple = ((rustc -vV | Select-String '^host: ').ToString() -replace '^host: ', '').Trim()
          Copy-Item "src-tauri/target/release/updater.exe" "src-tauri/binaries/updater-$triple.exe"

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked

  # ---- Linux leg (runs after Windows, on the same physical host) ----------
  linux:
    needs: windows
    # Run after Windows even if it failed (still serialized via needs) so a
    # Windows hiccup doesn't hide a Linux break; only skip if the run was
    # cancelled.
    if: ${{ !cancelled() }}
    runs-on: [self-hosted, prox-pve]
    # Use lld for the link step — much faster than the default bfd.
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          # Remove broken Microsoft apt sources that 403 on some hosts.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/dotnetdev.list \
                     /etc/apt/sources.list.d/microsoft.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev lld

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: ci-linux

      - name: Install npm deps
        run: npm ci

      - name: Frontend unit tests (vitest)
        run: npm test

      - name: Frontend build (tsc + vite)
        run: npm run build

      - name: Build bootstrap updater sidecar
        shell: bash
        run: |
          cargo build --release -p arcade_updater --manifest-path src-tauri/Cargo.toml
          mkdir -p src-tauri/binaries
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          cp "src-tauri/target/release/updater" "src-tauri/binaries/updater-$TRIPLE"

      - name: Rust unit tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Rust compile check (release)
        working-directory: src-tauri
        run: cargo check --release --locked
