# Android companion app build.
#
# Runs on the SAME self-hosted Windows box as the desktop Windows leg (VM 111
# `arcade-win10-runner`, label `arcade-win10`) at the owner's request. Nothing
# about an Android build needs Windows — it is a JVM + Android SDK job — but
# that host already has the disk, cores and network profile for heavy builds.
#
# The app is an Expo *managed* project that is prebuilt on the fly: `android/`
# is generated by `expo prebuild` each run and is gitignored, so the native
# project can never drift from app.json / the config plugins. react-native-webrtc
# is pulled in through @config-plugins/react-native-webrtc, which is why a bare
# Expo Go client cannot host this app and we build a real APK here.
#
# Debug-signed only. A release keystore is deliberately NOT in CI: signing keys
# do not live in this repo (see .gitignore), and the owner installs the APK
# directly rather than shipping through Play.
name: Android

on:
  push:
    branches: [main, feature/android-companion]
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: [self-hosted, Windows, X64, arcade-win10]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # Gradle 8 / AGP 8 require JDK 17. Temurin is downloaded and cached by the
      # action; the self-hosted host is not assumed to have any JDK.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Installs cmdline-tools + accepts licences and exports ANDROID_HOME /
      # ANDROID_SDK_ROOT. The platform/build-tools versions the Expo template
      # asks for are then fetched by Gradle itself on first build.
      #
      # Done by hand rather than with android-actions/setup-android, which fails
      # on THIS runner: it hands the downloaded archive to PowerShell's
      # Expand-Archive, and PS 5.1 refuses a temp file with no .zip extension.
      # Hosted runners get away with it because they have pwsh; VM 111 has only
      # Windows PowerShell 5.1. Unzipping in bash sidesteps the whole question.
      #
      # The SDK is installed once to a fixed path outside the workspace and
      # reused, so repeat builds neither re-download it nor re-accept licences.
      - name: Install the Android SDK
        shell: bash
        working-directory: .
        run: |
          set -euo pipefail
          SDK="C:/android-sdk"
          BIN="$SDK/cmdline-tools/latest/bin"
          if [ ! -x "$BIN/sdkmanager.bat" ]; then
            mkdir -p "$SDK/cmdline-tools"
            curl -sSLo /tmp/cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-win-11076708_latest.zip
            unzip -q -o /tmp/cmdline-tools.zip -d "$SDK/cmdline-tools"
            # The zip unpacks as cmdline-tools/; sdkmanager insists on being at
            # cmdline-tools/latest/ or it cannot locate the SDK root.
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/cmdline-tools" "$SDK/cmdline-tools/latest"
          fi
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$BIN" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"
          yes | "$BIN/sdkmanager.bat" --sdk_root="$SDK" --licenses > /dev/null || true
          "$BIN/sdkmanager.bat" --sdk_root="$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install npm deps
        run: npm ci

      # The pure cores are also covered by the repo-root vitest run, but this
      # leg type-checks the React Native UI, which the root tsconfig excludes.
      - name: Typecheck (includes the React Native UI)
        run: npm run typecheck

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Gradle assembleDebug
        working-directory: mobile/android
        shell: bash
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: arcadelauncher-companion-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
