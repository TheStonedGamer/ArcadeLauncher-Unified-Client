# Android companion app build.
#
# Runs on the self-hosted LINUX runner (`prox-pve`, CT 130 `arcade-gh-runner`),
# NOT the Windows desktop host. An Android build is a JVM + Android SDK job with
# nothing Windows-specific about it, and keeping it off `arcade-win10` means it no
# longer serializes behind the Windows desktop leg on that one box (see release.yml
# for the wall-clock story). Building on Linux also deletes three Windows-only
# workarounds this workflow used to carry:
#   * the C:\rn short-path copy (CMAKE_OBJECT_PATH_MAX — Linux has no 250-char
#     object-file-path limit, so expo-modules-core's C++ builds in place);
#   * the WOW64 makensis junction (Windows/NSIS only, irrelevant here);
#   * the PowerShell 5.1 unzip dance (plain bash on Linux).
#
# The app is an Expo *managed* project that is prebuilt on the fly: `android/`
# is generated by `expo prebuild` each run and is gitignored, so the native
# project can never drift from app.json / the config plugins. react-native-webrtc
# is pulled in through @config-plugins/react-native-webrtc, which is why a bare
# Expo Go client cannot host this app and we build a real APK here.
#
# Debug-signed only. A release keystore is deliberately NOT in CI here: signing
# keys do not live in this repo (see .gitignore), and the release-signed APK is
# built by release.yml on a tag push.
name: Android

on:
  push:
    branches: [main, feature/android-companion]
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: [self-hosted, prox-pve]
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      # Gradle 8 / AGP 8 require JDK 17. Temurin is downloaded and cached by the
      # action; the self-hosted host is not assumed to have any JDK.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Installs cmdline-tools + accepts licences and exports ANDROID_HOME /
      # ANDROID_SDK_ROOT. The platform/build-tools versions the Expo template
      # asks for are then fetched by Gradle itself on first build (NDK + cmake
      # included), so this mirrors the previous Windows leg exactly minus the
      # `.bat` suffixes and the Windows cmdline-tools archive.
      #
      # The SDK is installed once to a fixed path in $HOME (which persists on a
      # self-hosted runner, unlike the per-run workspace) and reused, so repeat
      # builds neither re-download it nor re-accept licences.
      - name: Install the Android SDK
        working-directory: .
        run: |
          set -euo pipefail
          SDK="$HOME/android-sdk"
          BIN="$SDK/cmdline-tools/latest/bin"
          if [ ! -x "$BIN/sdkmanager" ]; then
            mkdir -p "$SDK/cmdline-tools"
            curl -sSLo /tmp/cmdline-tools.zip \
              https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
            unzip -q -o /tmp/cmdline-tools.zip -d "$SDK/cmdline-tools"
            # The zip unpacks as cmdline-tools/; sdkmanager insists on being at
            # cmdline-tools/latest/ or it cannot locate the SDK root.
            rm -rf "$SDK/cmdline-tools/latest"
            mv "$SDK/cmdline-tools/cmdline-tools" "$SDK/cmdline-tools/latest"
          fi
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "$BIN" >> "$GITHUB_PATH"
          echo "$SDK/platform-tools" >> "$GITHUB_PATH"
          yes | "$BIN/sdkmanager" --sdk_root="$SDK" --licenses > /dev/null || true
          "$BIN/sdkmanager" --sdk_root="$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install npm deps
        run: npm ci

      # The pure cores are also covered by the repo-root vitest run, but this
      # leg type-checks the React Native UI, which the root tsconfig excludes.
      - name: Typecheck (includes the React Native UI)
        run: npm run typecheck

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Gradle assembleDebug
        working-directory: mobile/android
        run: |
          set -euo pipefail
          # arm64 is every phone made this decade; x86_64 keeps an emulator
          # able to run it. Dropping the two dead ABIs halves the C++ build.
          # --build-cache reuses task outputs from $HOME/.gradle across runs even
          # though the workspace android/ dir is regenerated each time.
          ./gradlew assembleDebug --no-daemon --build-cache --stacktrace \
            -PreactNativeArchitectures=arm64-v8a,x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: arcadelauncher-companion-apk
          path: mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
